spring:
  application:
    name: auction-backend
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:h2:mem:auction;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.auction.backend.auction.model,com.auction.backend.user.model
  configuration:
    map-underscore-to-camel-case: true

oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  bucket-name: howbirdfly
  access-key-id:
  access-key-secret:

auction:
  cache:
    redis:
      enabled: false
      lobby-ttl: 30m
      room-ttl: 30m
      leaderboard-ttl: 30m
      hot-room-buffer: 10m
      hot-access-threshold: 10
      bid-lock-ttl: 5s
  persistence:
    rabbitmq:
      enabled: false
      exchange: auction.hot-bid.exchange
      queue: auction.hot-bid.persist.queue
      routing-key: auction.hot-bid.persist
